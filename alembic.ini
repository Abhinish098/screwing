# alembic.ini - Alembic configuration for The Duel database

[alembic]
# REPLACE the URL below with your actual Neon.tech connection string.
# Format: postgresql+psycopg2://USER:PASSWORD@HOST/DBNAME?sslmode=require
# You can also set DATABASE_URL as an environment variable; env.py reads it.
script_location = alembic

sqlalchemy.url = postgresql+psycopg2://neondb_owner:npg_0nRklDYxLV5g@ep-red-mouse-apjpgh5i-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
